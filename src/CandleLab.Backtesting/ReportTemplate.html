<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__TITLE__</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181c24;
    --border: #242a36;
    --text: #d5d9e3;
    --muted: #7a8396;
    --accent: #6aa2ff;
    --bull: #4caf7a;
    --bear: #d05454;
    --rect: rgba(106, 162, 255, 0.12);
    --rect-border: rgba(106, 162, 255, 0.55);
    --entry-long: #4caf7a;
    --entry-short: #d05454;
    --stop: #e4a94d;
    --exit: #c07fe0;
    --grid: #222832;
  }
  html, body {
    background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    margin: 0; padding: 0; height: 100%;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 16px; }
  header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 13px; }
  .stats { display: flex; gap: 16px; margin-bottom: 12px; padding: 10px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; font-size: 13px; flex-wrap: wrap; }
  .stats .k { color: var(--muted); margin-right: 4px; }
  .stats .v { font-variant-numeric: tabular-nums; font-weight: 500; }
  .stats .v.pos { color: var(--bull); }
  .stats .v.neg { color: var(--bear); }
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .nav { display: flex; align-items: center; gap: 6px; }
  button {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; font-family: inherit; font-size: 13px;
  }
  .layer-toggles { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; }
  .layer-toggles label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
  .layer-toggles input { accent-color: var(--accent); }
  .chart-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px; position: relative; }
  #chart { width: 100%; height: 520px; display: block; }
  .session-summary { color: var(--muted); font-size: 12px; margin-top: 8px; }
  .session-summary .badge {
    display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px;
    background: #242a36; border: 1px solid var(--border); color: var(--text);
    margin-right: 4px;
  }
  .session-summary .badge.win { border-color: var(--bull); color: var(--bull); }
  .session-summary .badge.loss { border-color: var(--bear); color: var(--bear); }
  .tooltip {
    position: absolute; background: #0a0c12; border: 1px solid var(--border); padding: 6px 8px;
    border-radius: 4px; font-size: 11px; pointer-events: none; display: none;
    font-variant-numeric: tabular-nums; color: var(--text); min-width: 140px;
  }
  .tooltip .row { display: flex; justify-content: space-between; gap: 10px; }
  .tooltip .k { color: var(--muted); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <h1 id="title"></h1>
      <div class="meta" id="meta"></div>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="nav">
      <button id="prev" type="button">← Prev</button>
      <select id="daySelect"></select>
      <button id="next" type="button">Next →</button>
    </div>
    <div class="layer-toggles">
      <label><input type="checkbox" data-layer="rectangle" checked> Rectangle</label>
      <label><input type="checkbox" data-layer="breakout" checked> Breakout</label>
      <label><input type="checkbox" data-layer="rejection" checked> Rejection</label>
      <label><input type="checkbox" data-layer="entry" checked> Entry</label>
      <label><input type="checkbox" data-layer="stop" checked> Stop</label>
      <label><input type="checkbox" data-layer="exit" checked> Exit</label>
      <label><input type="checkbox" data-layer="pyramid" checked> Pyramid</label>
      <label><input type="checkbox" data-layer="volume" checked> Volume</label>
    </div>
  </div>

  <div class="chart-wrap">
    <svg id="chart" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="session-summary" id="sessionSummary"></div>

</div>

<script id="data" type="application/json">__PAYLOAD_JSON__</script>
<script>
(() => {
  // ─── Data ───────────────────────────────────────────────────────────
  const DATA = JSON.parse(document.getElementById('data').textContent);
  let currentIdx = 0;
  const layers = { rectangle: true, breakout: true, rejection: true, entry: true, stop: true, exit: true, pyramid: true, volume: true };

  // ─── Render header + stats ──────────────────────────────────────────
  document.getElementById('title').textContent = `${DATA.strategyName} · ${DATA.symbol}`;
  document.getElementById('meta').textContent =
    `${DATA.startTime.slice(0,10)} → ${DATA.endTime.slice(0,10)}   |   ${DATA.sessions.length} sessions`;

  const retPct = DATA.totalReturnPercent;
  const retClass = retPct > 0 ? 'pos' : retPct < 0 ? 'neg' : '';
  document.getElementById('stats').innerHTML = `
    <div><span class="k">Start</span> <span class="v">$${fmt(DATA.startingCapital)}</span></div>
    <div><span class="k">End</span> <span class="v">$${fmt(DATA.endingEquity)}</span></div>
    <div><span class="k">Return</span> <span class="v ${retClass}">${retPct.toFixed(2)}%</span></div>
    <div><span class="k">Trades</span> <span class="v">${DATA.metrics.totalTrades}</span></div>
    <div><span class="k">Win rate</span> <span class="v">${(DATA.metrics.winRate).toFixed(1)}%</span></div>
    <div><span class="k">Profit factor</span> <span class="v">${DATA.metrics.profitFactor.toFixed(2)}</span></div>
    <div><span class="k">Sharpe</span> <span class="v">${DATA.metrics.sharpe.toFixed(2)}</span></div>
    <div><span class="k">Max DD</span> <span class="v neg">${DATA.metrics.maxDrawdownPercent.toFixed(2)}%</span></div>
  `;

  // ─── Day selector ───────────────────────────────────────────────────
  const sel = document.getElementById('daySelect');
  DATA.sessions.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    const flags = [];
    if (s.overlays.rectangle) flags.push('▢');
    if (s.trades.length) flags.push(s.trades.some(t => t.isWin) ? '✓' : '✗');
    opt.textContent = `${s.day}${flags.length ? '  ' + flags.join(' ') : ''}`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => { currentIdx = +sel.value; render(); });
  document.getElementById('prev').addEventListener('click', () => { if (currentIdx > 0) { currentIdx--; sel.value = currentIdx; render(); } });
  document.getElementById('next').addEventListener('click', () => { if (currentIdx < DATA.sessions.length - 1) { currentIdx++; sel.value = currentIdx; render(); } });

  // ─── Layer toggles ──────────────────────────────────────────────────
  document.querySelectorAll('.layer-toggles input').forEach(cb => {
    cb.addEventListener('change', () => {
      layers[cb.dataset.layer] = cb.checked;
      render();
    });
  });

  // ─── Render ─────────────────────────────────────────────────────────
  const svg = document.getElementById('chart');
  const tooltip = document.getElementById('tooltip');

  function render() {
    const session = DATA.sessions[currentIdx];
    if (!session) return;

    const bars = session.bars;
    if (bars.length === 0) { svg.innerHTML = ''; return; }

    // Layout dimensions. We measure the SVG's actual rendered size so zooming
    // the browser window produces sensibly sized charts.
    const rect = svg.getBoundingClientRect();
    const W = rect.width || 1200;
    const H = rect.height || 520;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    const padL = 56, padR = 12, padT = 12, padB = 40;
    const volH = layers.volume ? 60 : 0;      // bottom strip for volume
    const plotW = W - padL - padR;
    const plotH = H - padT - padB - volH;

    // Price range.
    let priceMin = Infinity, priceMax = -Infinity;
    for (const b of bars) { if (b.l < priceMin) priceMin = b.l; if (b.h > priceMax) priceMax = b.h; }

    // Include overlay levels in price range so nothing gets clipped.
    const rectOv = session.overlays.rectangle;
    if (rectOv) {
      if (+rectOv.bottom < priceMin) priceMin = +rectOv.bottom;
      if (+rectOv.top > priceMax) priceMax = +rectOv.top;
    }
    for (const t of session.trades) {
      priceMin = Math.min(priceMin, +t.entryPrice, +t.exitPrice);
      priceMax = Math.max(priceMax, +t.entryPrice, +t.exitPrice);
    }

    const pad = (priceMax - priceMin) * 0.06 || 1;
    priceMin -= pad; priceMax += pad;

    // Scales.
    const barW = Math.max(2, plotW / bars.length * 0.8);
    const barStep = plotW / bars.length;
    const x = i => padL + i * barStep + barStep / 2;
    const y = p => padT + (1 - (p - priceMin) / (priceMax - priceMin)) * plotH;
    const volMax = Math.max(...bars.map(b => +b.v)) || 1;
    const yVol = v => padT + plotH + (1 - v / volMax) * volH;

    // Time-index lookup: for overlays we convert an ISO timestamp back to a bar index.
    const timeIndex = new Map(bars.map((b, i) => [b.t, i]));

    // Build SVG content.
    let out = '';

    // Grid + Y axis labels.
    out += `<g stroke="var(--grid)" stroke-width="1">`;
    const yTicks = 5;
    for (let i = 0; i <= yTicks; i++) {
      const price = priceMin + (priceMax - priceMin) * (i / yTicks);
      const yy = y(price);
      out += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" opacity="0.35"/>`;
      out += `<text x="${padL - 6}" y="${yy + 3}" fill="var(--muted)" font-size="10" text-anchor="end" stroke="none">${price.toFixed(2)}</text>`;
    }
    out += `</g>`;

    // X axis labels — one every ~10 bars.
    out += `<g fill="var(--muted)" font-size="10" text-anchor="middle">`;
    const xTickEvery = Math.max(1, Math.floor(bars.length / 8));
    for (let i = 0; i < bars.length; i += xTickEvery) {
      const hhmm = bars[i].t.substring(11, 16);
      out += `<text x="${x(i)}" y="${padT + plotH + volH + 20}">${hhmm}</text>`;
    }
    out += `</g>`;

    // Rectangle overlay (behind bars so bars are readable).
    if (layers.rectangle && rectOv) {
      const rx1 = x(0) - barStep / 2;
      // Rectangle extends from open to expiresAt — clamp to chart.
      let endIdx = bars.length - 1;
      for (let i = 0; i < bars.length; i++) {
        if (bars[i].t >= rectOv.expiresAt) { endIdx = i; break; }
      }
      const rx2 = x(endIdx) + barStep / 2;
      const ry1 = y(+rectOv.top);
      const ry2 = y(+rectOv.bottom);
      out += `<rect x="${rx1}" y="${ry1}" width="${rx2 - rx1}" height="${ry2 - ry1}"
                fill="var(--rect)" stroke="var(--rect-border)" stroke-dasharray="4 3"/>`;
      out += `<text x="${rx1 + 4}" y="${ry1 - 4}" fill="var(--rect-border)" font-size="10">Opening range</text>`;
    }

    // Volume bars.
    if (layers.volume) {
      for (let i = 0; i < bars.length; i++) {
        const b = bars[i];
        const bullish = b.c >= b.o;
        const vy = yVol(+b.v);
        const vh = (padT + plotH + volH) - vy;
        out += `<rect x="${x(i) - barW / 2}" y="${vy}" width="${barW}" height="${vh}"
                   fill="${bullish ? 'var(--bull)' : 'var(--bear)'}" opacity="0.4"/>`;
      }
    }

    // Candlesticks.
    for (let i = 0; i < bars.length; i++) {
      const b = bars[i];
      const bullish = b.c >= b.o;
      const colour = bullish ? 'var(--bull)' : 'var(--bear)';
      const cx = x(i);
      // Wick.
      out += `<line x1="${cx}" y1="${y(+b.h)}" x2="${cx}" y2="${y(+b.l)}" stroke="${colour}" stroke-width="1"/>`;
      // Body.
      const bodyTop = y(Math.max(+b.o, +b.c));
      const bodyBot = y(Math.min(+b.o, +b.c));
      const bodyH = Math.max(1, bodyBot - bodyTop);
      out += `<rect class="bar" data-i="${i}" x="${cx - barW / 2}" y="${bodyTop}" width="${barW}" height="${bodyH}"
                 fill="${colour}" stroke="${colour}"/>`;
    }

    // Breakout marker.
    const bo = session.overlays.breakout;
    if (layers.breakout && bo && timeIndex.has(bo.time)) {
      const i = timeIndex.get(bo.time);
      const cx = x(i);
      const arrowY = bo.side === 'Long' ? y(+bo.close) - 16 : y(+bo.close) + 16;
      const colour = bo.side === 'Long' ? 'var(--bull)' : 'var(--bear)';
      out += `<circle cx="${cx}" cy="${y(+bo.close)}" r="4" fill="none" stroke="${colour}" stroke-width="2"/>`;
      out += `<text x="${cx}" y="${arrowY}" fill="${colour}" font-size="10" text-anchor="middle">Breakout ${bo.side === 'Long' ? '↑' : '↓'}</text>`;
    }

    // Rejection marker.
    const rj = session.overlays.rejection;
    if (layers.rejection && rj && timeIndex.has(rj.time)) {
      const i = timeIndex.get(rj.time);
      const cx = x(i);
      const b = bars[i];
      out += `<rect x="${cx - barW / 2 - 2}" y="${y(+b.h) - 2}" width="${barW + 4}" height="${y(+b.l) - y(+b.h) + 4}"
                 fill="none" stroke="#f4d06f" stroke-width="1.5" stroke-dasharray="2 2"/>`;
      out += `<text x="${cx}" y="${y(+b.l) + 14}" fill="#f4d06f" font-size="10" text-anchor="middle">Rejection</text>`;
    }

    // Trade overlays: entry, stop, exit, pyramid adds.
    for (const t of session.trades) {
      // Determine x-range of this trade within the current session.
      // - If opened in this session: find the bar index, else clamp to left edge.
      // - If closed in this session: find the bar index, else clamp to right edge.
      let openIdx = timeIndex.has(t.openedAt) ? timeIndex.get(t.openedAt) : null;
      let closeIdx = timeIndex.has(t.closedAt) ? timeIndex.get(t.closedAt) : null;
      // If neither endpoint is in this session, the position spans the whole
      // session (it was opened earlier and not closed yet).
      const lineX1 = openIdx !== null ? x(openIdx) : padL;
      const lineX2 = closeIdx !== null ? x(closeIdx) : (W - padR);

      // Entry: horizontal line across the active window only.
      if (layers.entry) {
        const colour = t.side === 'Long' ? 'var(--entry-long)' : 'var(--entry-short)';
        const ey = y(+t.entryPrice);
        out += `<line x1="${lineX1}" y1="${ey}" x2="${lineX2}" y2="${ey}" stroke="${colour}" stroke-width="1.5" stroke-dasharray="5 3"/>`;
        // Label only on the session where the trade actually opened.
        if (openIdx !== null) {
          out += `<text x="${lineX1 + 4}" y="${ey - 4}" fill="${colour}" font-size="10">${t.side} @ ${(+t.entryPrice).toFixed(2)}</text>`;
        }
      }

      // Exit marker on the exit bar (if exit is within this session).
      if (layers.exit && closeIdx !== null) {
        const cx = x(closeIdx);
        const ey = y(+t.exitPrice);
        const colour = t.isWin ? 'var(--bull)' : 'var(--bear)';
        out += `<circle cx="${cx}" cy="${ey}" r="5" fill="${colour}" opacity="0.85"/>`;
        out += `<text x="${cx + 8}" y="${ey + 3}" fill="${colour}" font-size="10">${t.exitReason} ${t.netPnl >= 0 ? '+' : ''}${t.netPnl.toFixed(2)}</text>`;
      }
    }

    // Separator line between price plot and volume.
    if (layers.volume) {
      out += `<line x1="${padL}" y1="${padT + plotH}" x2="${W - padR}" y2="${padT + plotH}" stroke="var(--border)" stroke-width="1"/>`;
    }

    svg.innerHTML = out;

    // Session summary below chart.
    const s = DATA.sessions[currentIdx];
    const summary = [];
    if (s.overlays.rectangle) summary.push(`<span class="badge">OR drawn ${(+s.overlays.rectangle.bottom).toFixed(2)}–${(+s.overlays.rectangle.top).toFixed(2)}</span>`);
    if (s.overlays.breakout) summary.push(`<span class="badge">Breakout ${s.overlays.breakout.side}</span>`);
    if (s.overlays.rejection) summary.push(`<span class="badge">Rejection</span>`);
    for (const t of s.trades) {
      const cls = t.isWin ? 'win' : 'loss';
      summary.push(`<span class="badge ${cls}">${t.side} ${t.netPnl >= 0 ? '+' : ''}${t.netPnl.toFixed(2)} (${t.exitReason})</span>`);
    }
    document.getElementById('sessionSummary').innerHTML = summary.length ? summary.join(' ') : '<em>No strategy events this session.</em>';

    // Tooltip wiring.
    svg.querySelectorAll('.bar').forEach(el => {
      el.addEventListener('mousemove', (ev) => {
        const i = +el.dataset.i;
        const b = bars[i];
        tooltip.style.display = 'block';
        tooltip.style.left = (ev.pageX + 12) + 'px';
        tooltip.style.top = (ev.pageY + 12) + 'px';
        tooltip.innerHTML = `
          <div class="row"><span class="k">Time</span><span>${b.t.substring(11,16)}</span></div>
          <div class="row"><span class="k">O</span><span>${(+b.o).toFixed(2)}</span></div>
          <div class="row"><span class="k">H</span><span>${(+b.h).toFixed(2)}</span></div>
          <div class="row"><span class="k">L</span><span>${(+b.l).toFixed(2)}</span></div>
          <div class="row"><span class="k">C</span><span>${(+b.c).toFixed(2)}</span></div>
          <div class="row"><span class="k">V</span><span>${(+b.v).toLocaleString()}</span></div>
        `;
      });
      el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    });

    // Update button states.
    document.getElementById('prev').disabled = currentIdx === 0;
    document.getElementById('next').disabled = currentIdx === DATA.sessions.length - 1;
  }

  function fmt(n) {
    return (+n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // Re-render on window resize so the SVG adapts.
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 100);
  });

  render();
})();
</script>
</body>
</html>
